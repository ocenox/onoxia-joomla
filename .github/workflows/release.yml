name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build packages
        run: bash build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ONOXIA Joomla ${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            dist/pkg_onoxia-${{ steps.version.outputs.VERSION }}.zip
            dist/plg_system_onoxia-${{ steps.version.outputs.VERSION }}.zip
            dist/com_onoxia-${{ steps.version.outputs.VERSION }}.zip

      - name: Prepare GitHub Pages content
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p _pages
          sed "s/{{VERSION}}/${VERSION}/g" update.xml > _pages/update.xml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _pages
          publish_branch: gh-pages
          force_orphan: true
